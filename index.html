<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xuan | Fullstack Developer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" type="image/x-icon" href="/xuanco941/favicon.ico">
  <link
    href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;600&family=Inter:wght@300;400;600;800&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: #030308;
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    code,
    pre {
      font-family: 'Fira Code', monospace;
    }

    /* Hide scrollbar for cleaner look */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #00f3ff40, #bd00ff40);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, #00f3ff, #bd00ff);
    }

    /* Neon text effects */
    .neon-text {
      text-shadow:
        0 0 5px rgba(0, 243, 255, 0.8),
        0 0 10px rgba(0, 243, 255, 0.6),
        0 0 20px rgba(0, 243, 255, 0.4),
        0 0 40px rgba(0, 243, 255, 0.2);
    }

    .neon-text-purple {
      text-shadow:
        0 0 5px rgba(189, 0, 255, 0.8),
        0 0 10px rgba(189, 0, 255, 0.6),
        0 0 20px rgba(189, 0, 255, 0.4),
        0 0 40px rgba(189, 0, 255, 0.2);
    }

    /* Glassmorphism box */
    .glass-box {
      background: rgba(10, 15, 30, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    /* Neon box with gradient border */
    .neon-box {
      position: relative;
      background: rgba(10, 15, 30, 0.8);
      border: 1px solid transparent;
      background-clip: padding-box;
      box-shadow:
        0 0 20px rgba(0, 243, 255, 0.1),
        0 0 40px rgba(0, 243, 255, 0.05);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .neon-box::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, #00f3ff30, #bd00ff30, #ff005530);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .neon-box:hover {
      box-shadow:
        0 0 30px rgba(0, 243, 255, 0.25),
        0 0 60px rgba(0, 243, 255, 0.1);
      transform: translateY(-2px);
    }

    .neon-box:hover::before {
      background: linear-gradient(135deg, #00f3ff80, #bd00ff80, #ff005580);
    }

    /* Animated gradient border */
    @keyframes borderGlow {

      0%,
      100% {
        opacity: 0.5;
      }

      50% {
        opacity: 1;
      }
    }

    .animated-border::before {
      animation: borderGlow 2s ease-in-out infinite;
    }

    /* Pulse animation for indicators */
    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.6;
        transform: scale(1.1);
      }
    }

    .pulse {
      animation: pulse 2s ease-in-out infinite;
    }

    /* Smooth transitions */
    * {
      scroll-behavior: smooth;
    }

    /* Focus states for accessibility */
    a:focus-visible,
    button:focus-visible {
      outline: 2px solid #00f3ff;
      outline-offset: 2px;
    }

    /* Selection color */
    ::selection {
      background: rgba(0, 243, 255, 0.3);
      color: #ffffff;
    }

    .page-shell ::selection {
      background: rgba(45, 212, 191, 0.32);
      color: #000000;
    }

    .circuit-grid {
      background-image:
        linear-gradient(rgba(45, 212, 191, 0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(45, 212, 191, 0.07) 1px, transparent 1px),
        radial-gradient(circle at 20% 20%, rgba(20, 184, 166, 0.13), transparent 28%),
        radial-gradient(circle at 80% 12%, rgba(245, 158, 11, 0.1), transparent 26%);
      background-size: 48px 48px, 48px 48px, 100% 100%, 100% 100%;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.25));
    }

    .cv-sheet {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.9);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(18px);
    }

    .cv-sheet::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(45, 212, 191, 0.1), transparent 18%, transparent 82%, rgba(245, 158, 11, 0.08)),
        linear-gradient(180deg, rgba(255, 255, 255, 0.055), transparent 24%);
    }

    .cv-sheet>* {
      position: relative;
      z-index: 1;
    }

    .page-shell {
      min-height: 100vh;
      background: #0b1120;
      color: #f8fafc;
    }

    .ambient-layer {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .circuit-grid {
      position: absolute;
      inset: 0;
    }

    .glow {
      position: absolute;
      width: 18rem;
      height: 18rem;
      border-radius: 999px;
      filter: blur(70px);
    }

    .glow-cyan {
      left: 8%;
      top: 12%;
      background: rgba(20, 184, 166, 0.12);
    }

    .glow-coral {
      right: 10%;
      bottom: 18%;
      background: rgba(245, 158, 11, 0.11);
    }

    .site-wrap {
      position: relative;
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 40px 48px;
    }

    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 38px;
    }

    .brand,
    .nav-links,
    .download-btn,
    .switch-page-link,
    .contact-list a,
    .cta-panel a {
      display: inline-flex;
      align-items: center;
    }

    .top-actions {
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .brand {
      gap: 12px;
      color: #f8fafc;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
    }

    .brand span {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(94, 234, 212, 0.35);
      border-radius: 8px;
      background: rgba(20, 184, 166, 0.12);
      color: #99f6e4;
    }

    .nav-links {
      gap: 28px;
      font-size: 14px;
    }

    .nav-links a,
    .contact-list a,
    .cta-panel a {
      color: #94a3b8;
      text-decoration: none;
      transition: color 0.2s ease, transform 0.2s ease, background 0.2s ease;
    }

    .nav-links a:hover,
    .contact-list a:hover {
      color: #99f6e4;
    }

    .download-btn {
      gap: 8px;
      border: 0;
      border-radius: 8px;
      background: #f59e0b;
      color: #111827;
      padding: 10px 16px;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 14px 32px rgba(245, 158, 11, 0.22);
    }

    .download-btn:hover {
      transform: translateY(-1px);
      background: #fbbf24;
    }

    .switch-page-link {
      justify-content: center;
      min-height: 38px;
      border: 1px solid rgba(94, 234, 212, 0.28);
      border-radius: 8px;
      padding: 8px 13px;
      color: #ccfbf1;
      text-decoration: none;
      font-size: 13px;
      font-weight: 800;
      transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
    }

    .switch-page-link:hover {
      transform: translateY(-1px);
      background: rgba(20, 184, 166, 0.12);
      color: #ffffff;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 32px;
      padding: 40px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .hero-copy {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 34px;
    }

    .signal-line {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin-bottom: 20px;
      color: #99f6e4;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 12px;
      font-weight: 800;
    }

    .signal-line span:nth-child(even) {
      color: #64748b;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    .hero h1 {
      max-width: 760px;
      color: #ffffff;
      font-size: clamp(48px, 7vw, 86px);
      line-height: 0.95;
      letter-spacing: 0;
      font-weight: 900;
    }

    .role {
      margin-top: 20px;
      color: #fbbf24;
      font-size: 22px;
      font-weight: 800;
    }

    .headline {
      max-width: 760px;
      margin-top: 20px;
      color: #cbd5e1;
      font-size: 16px;
      line-height: 1.8;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      color: #cbd5e1;
      font-size: 14px;
    }

    .info-item {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      min-width: 0;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.035);
      padding: 10px 12px;
    }

    .info-item svg {
      flex: 0 0 auto;
      margin-top: 2px;
      color: #99f6e4;
    }

    .portrait-panel {
      position: relative;
      min-height: 420px;
      overflow: hidden;
      border: 1px solid rgba(94, 234, 212, 0.18);
      border-radius: 10px;
      background: rgba(2, 6, 23, 0.62);
      padding: 20px;
    }

    .portrait-panel::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, #5eead4, transparent);
    }

    .portrait {
      position: relative;
      max-width: 310px;
      aspect-ratio: 4 / 5;
      margin: 0 auto;
      overflow: hidden;
      border-radius: 8px;
      background: #ffffff;
    }

    .portrait img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 20px;
    }

    .stat {
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.04);
      padding: 12px 8px;
      text-align: center;
    }

    .stat strong {
      display: block;
      color: #99f6e4;
      font-size: 22px;
      font-weight: 900;
      line-height: 1.1;
    }

    .stat span {
      display: block;
      margin-top: 6px;
      color: #94a3b8;
      font-size: 11px;
      line-height: 1.35;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 0.84fr 1.16fr;
    }

    .left-column,
    .right-column {
      padding: 40px;
    }

    .left-column {
      border-right: 1px solid rgba(255, 255, 255, 0.1);
    }

    .cv-section {
      margin-bottom: 36px;
    }

    .cv-section:last-child {
      margin-bottom: 0;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .section-title>span {
      display: grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border: 1px solid rgba(94, 234, 212, 0.22);
      border-radius: 8px;
      background: rgba(20, 184, 166, 0.12);
      color: #ccfbf1;
    }

    .section-title h2 {
      color: #ffffff;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 0;
    }

    .cv-section p,
    .highlight p,
    .project-card p,
    .cta-panel p {
      color: #cbd5e1;
      line-height: 1.7;
    }

    .stack-list {
      display: grid;
      gap: 20px;
    }

    .stack-group h3 {
      margin-bottom: 9px;
      color: #ffffff;
      font-size: 14px;
      font-weight: 800;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 1px solid rgba(94, 234, 212, 0.18);
      border-radius: 6px;
      background: rgba(20, 184, 166, 0.1);
      padding: 6px 10px;
      color: #ccfbf1;
      font-size: 12px;
      line-height: 1;
    }

    .contact-list {
      display: grid;
      gap: 12px;
      color: #cbd5e1;
      font-size: 14px;
    }

    .contact-list a,
    .contact-list span {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .highlight-list {
      display: grid;
      gap: 16px;
    }

    .highlight {
      display: grid;
      grid-template-columns: 36px 1fr;
      gap: 12px;
    }

    .highlight>span {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: rgba(245, 158, 11, 0.16);
      color: #fde68a;
      font-weight: 900;
    }

    .highlight p {
      padding-top: 5px;
    }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .project-card {
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.035);
      padding: 16px;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .project-card:hover {
      transform: translateY(-3px);
      border-color: rgba(94, 234, 212, 0.36);
      background: rgba(255, 255, 255, 0.055);
    }

    .project-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .project-head h3 {
      color: #ffffff;
      font-size: 16px;
      font-weight: 900;
    }

    .project-head span {
      flex: 0 0 auto;
      border-radius: 6px;
      background: rgba(20, 184, 166, 0.12);
      padding: 5px 8px;
      color: #ccfbf1;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 10px;
      font-weight: 900;
    }

    .project-card p {
      color: #94a3b8;
      font-size: 14px;
    }

    .cta-panel {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      border: 1px solid rgba(245, 158, 11, 0.28);
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(245, 158, 11, 0.12), rgba(20, 184, 166, 0.06));
      padding: 20px;
    }

    .cta-panel h2 {
      color: #ffffff;
      font-size: 22px;
      font-weight: 900;
    }

    .cta-panel p {
      margin-top: 8px;
      font-size: 14px;
    }

    .cta-panel a {
      flex: 0 0 auto;
      justify-content: center;
      gap: 8px;
      border: 1px solid rgba(94, 234, 212, 0.32);
      border-radius: 8px;
      padding: 10px 16px;
      color: #ccfbf1;
      font-weight: 800;
    }

    .cta-panel a:hover {
      background: rgba(20, 184, 166, 0.12);
    }

    .left-column .cta-panel {
      min-height: 220px;
      align-items: flex-start;
      flex-direction: column;
    }

    .left-column .cta-panel a {
      margin-top: auto;
    }

    /* Recruiter-friendly light theme for the online CV */
    .page-shell {
      background:
        radial-gradient(circle at 18% 0%, rgba(45, 212, 191, 0.12), transparent 26%),
        radial-gradient(circle at 82% 8%, rgba(59, 130, 246, 0.1), transparent 24%),
        #f6f8fb;
      color: #0f172a;
    }

    .page-shell .circuit-grid {
      opacity: 0.42;
      background-image:
        linear-gradient(rgba(15, 23, 42, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15, 23, 42, 0.045) 1px, transparent 1px);
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.42), transparent 82%);
    }

    .page-shell .glow-cyan {
      background: rgba(45, 212, 191, 0.14);
    }

    .page-shell .glow-coral {
      background: rgba(59, 130, 246, 0.12);
    }

    .page-shell .brand {
      color: #0f172a;
    }

    .page-shell .brand span,
    .page-shell .section-title>span {
      border-color: rgba(20, 184, 166, 0.28);
      background: rgba(20, 184, 166, 0.08);
      color: #0f766e;
    }

    .page-shell .nav-links a,
    .page-shell .contact-list a,
    .page-shell .cta-panel a {
      color: #475569;
    }

    .page-shell .nav-links a:hover,
    .page-shell .contact-list a:hover,
    .page-shell .cta-panel a:hover {
      color: #0f766e;
    }

    .page-shell .switch-page-link {
      border-color: #cbd5e1;
      background: #ffffff;
      color: #334155;
    }

    .page-shell .switch-page-link:hover {
      background: #f1f5f9;
      color: #0f172a;
    }

    .page-shell .download-btn {
      background: #0f766e;
      color: #ffffff;
      box-shadow: 0 12px 28px rgba(15, 118, 110, 0.2);
    }

    .page-shell .download-btn:hover {
      background: #115e59;
    }

    .page-shell .cv-sheet {
      border-color: #dbe4ef;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
    }

    .page-shell .cv-sheet::before {
      background:
        linear-gradient(90deg, rgba(20, 184, 166, 0.08), transparent 22%, transparent 78%, rgba(59, 130, 246, 0.06)),
        linear-gradient(180deg, rgba(255, 255, 255, 0.75), transparent 30%);
    }

    .page-shell .hero,
    .page-shell .left-column {
      border-color: #e2e8f0;
    }

    .page-shell .signal-line,
    .page-shell .info-item svg,
    .page-shell .stat strong {
      color: #0f766e;
    }

    .page-shell .signal-line span:nth-child(even) {
      color: #94a3b8;
    }

    .page-shell .hero h1,
    .page-shell .section-title h2,
    .page-shell .stack-group h3,
    .page-shell .project-head h3,
    .page-shell .cta-panel h2 {
      color: #0f172a;
    }

    .page-shell .role {
      color: #2563eb;
    }

    .page-shell .headline,
    .page-shell .info-grid,
    .page-shell .cv-section p,
    .page-shell .highlight p,
    .page-shell .cta-panel p,
    .page-shell .contact-list {
      color: #334155;
    }

    .page-shell .portrait-panel,
    .page-shell .info-item,
    .page-shell .stat,
    .page-shell .project-card,
    .page-shell .chip,
    .page-shell .cta-panel {
      border-color: #dbe4ef;
      background: #ffffff;
    }

    .page-shell .portrait-panel::before {
      background: linear-gradient(90deg, transparent, #14b8a6, transparent);
    }

    .page-shell .stat span,
    .page-shell .project-card p {
      color: #64748b;
    }

    .page-shell .chip,
    .page-shell .project-head span {
      border-color: #cde7e4;
      background: #ecfdf5;
      color: #0f766e;
    }

    .page-shell .highlight>span {
      background: #eff6ff;
      color: #1d4ed8;
    }

    .page-shell .project-card:hover {
      border-color: rgba(20, 184, 166, 0.42);
      background: #f8fafc;
    }

    .page-shell .cta-panel {
      background: linear-gradient(135deg, #f8fafc, #ecfeff);
    }

    .page-shell .cta-panel a {
      border-color: #99f6e4;
      background: #ffffff;
      color: #0f766e;
    }

    .page-shell .cta-panel a:hover {
      background: #ccfbf1;
    }

    @media (max-width: 860px) {
      .site-wrap {
        padding: 12px 10px 24px;
      }

      .nav-links {
        display: none;
      }

      .top-nav {
        margin-bottom: 12px;
      }

      .hero,
      .content-grid {
        grid-template-columns: 1fr;
      }

      .hero,
      .left-column,
      .right-column {
        padding: 18px;
      }

      .left-column {
        border-right: 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .hero h1 {
        font-size: clamp(34px, 11vw, 52px);
        line-height: 0.98;
      }

      .role {
        margin-top: 14px;
        font-size: 18px;
      }

      .headline {
        margin-top: 14px;
        font-size: 14px;
        line-height: 1.65;
      }
